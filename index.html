<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobFinder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <span class="logo-icon"><i class="ti ti-briefcase"></i></span>
      JobFinder
    </div>
    <div class="search-bar">
      <i class="ti ti-search"></i>
      <input type="text" id="search" placeholder="Job title, company, or keyword…">
    </div>
    <select id="typeFilter">
      <option value="">All types</option>
      <option value="FULLTIME">Full-time</option>
      <option value="PARTTIME">Part-time</option>
      <option value="CONTRACT">Contract</option>
    </select>
    <button onclick="searchJobs()"><i class="ti ti-search"></i> Search</button>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h1>Find your <em>dream job</em></h1>
    <p>Real-time openings across India — updated daily</p>
  </div>

  <div id="jobCount" class="job-count"></div>

  <!-- MAIN GRID -->
  <div class="main">

    <!-- JOB LIST -->
    <div class="jobs-section" id="jobList">
      <p class="placeholder"><i class="ti ti-search"></i> Search for jobs above to get started</p>
    </div>

    <!-- SAVED -->
    <div class="saved-section">
      <div class="section-label"><i class="ti ti-heart"></i> Saved jobs</div>
      <div id="savedJobs"><p class="empty">No saved jobs yet</p></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
